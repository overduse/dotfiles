# === General setting ===

# Renumber windows
set -g renumber-windows on
set -g base-index 1

# Mouse mode
set -g mouse on

# Stop renaming
set-option -g allow-rename off
set -sg escape-time 10

# === Look & Feel ===

# True colors support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Theme: tokyo-night-tmux — handles status bar, window tabs, pane borders

# Pane separators
set -g pane-border-lines simple
set -g pane-border-style fg=#3b4261
set -g pane-active-border-style fg=#bb9af7

# === Keybindings ===

# Remap prefix ^b -> ^a
unbind C-b
set-option -g prefix C-a
set-option -g repeat-time 0
set-option -g focus-event on

# Split windows
# Prefix + %  = 水平拆分（左右）
# Prefix + "  = 垂直拆分（上下）
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Switch panes using vim-like keystrokes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Switch panes using Alt-hjkl without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resizing pane
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Select windows without prefix
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Moving window
bind-key -n M-S-Left swap-window -t -1 \; previous-window
bind-key -n M-S-Right swap-window -t +1 \; next-window

# copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# reload
bind r source-file "~/.config/tmux/tmux.conf" \; display "Reload!"

#######################
# Tmux Plugin Manager #
#######################

set -g @plugin "tmux-plugins/tpm"

# tokyo-night theme
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_battery_name "BAT0"
set -g @tokyo-night-tmux_show_music 1
set -g @tokyo-night-tmux_show_git 1

# fzf integration
set -g @plugin "sainnhe/tmux-fzf"

# clipboard + URL open
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

# visual session switcher
set -g @plugin 'omerxx/tmux-sessionx'

# lazygit popup
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
