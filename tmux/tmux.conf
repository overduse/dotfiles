# === General setting ===

# Renumber windows
set -g renumber-windows on
set -g base-index 1

# Mouse mode
set -g mouse on

# Stop renaming
set-option -g allow-rename off
set -sg escape-time 10

# === Look & Feel ===

# True colors support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Gruvbox palette (DerAnsari, matching Kitty terminal)
# bg: #2C2A24  bg_light: #3A372F  fg: #DDD5C4  accent: #7699A3

# Pane borders
set -g pane-border-lines simple
set -g pane-border-style fg="#3A372F"
set -g pane-active-border-style fg="#7699A3"

# Status bar
set -g status-style bg=terminal,fg="#A0907A"
set -g status-justify left
set -g status-position bottom
set -g status-interval 1
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[fg=#2C2A24,bg=#A0907A] #{?client_prefix,#[bg=#7699A3],} #S #[fg=#A0907A,bg=#2C2A24]"
set -g status-right "#[fg=#DDD5C4,bg=#2C2A24] %Y-%m-%d %H:%M:%S #[fg=#2C2A24,bg=#2C2A24]#[fg=#2C2A24,bg=#A0907A]#{?client_prefix,#[bg=#7699A3],} #{host_short} "

# Window tabs
set -g window-status-style bg="#2C2A24",fg="#DDD5C4"
set -g window-status-format "#{?window_zoomed_flag,#[fg=default bold],#[fg=default]} #{window_index} #{window_name}#{?window_zoomed_flag, +,}"
set -g window-status-current-style bg="#7699A3",fg="#2C2A24"
set -g window-status-current-format "#[fg=default] #{window_index} #{window_name} "
set -g window-status-activity-style bg="#2C2A24",fg="#A0907A"
set -g window-status-bell-style bg="#2C2A24",fg="#D08B57"
set -g window-status-separator ""

# Mode / message
set -g mode-style bg="#7699A3",fg="#2C2A24"
set -g message-style bg="#D08B57",fg="#2C2A24"
set -g message-command-style bg="#A0907A",fg="#2C2A24"

# === Keybindings ===

# Remap prefix ^b -> ^a
unbind C-b
set-option -g prefix C-a
set-option -g repeat-time 0
set-option -g focus-event on

# Split windows
# Prefix + %  = 水平拆分（左右）
# Prefix + "  = 垂直拆分（上下）
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Switch panes using vim-like keystrokes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Switch panes using Alt-hjkl without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resizing pane
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Select windows without prefix
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Moving window
bind-key -n M-S-Left swap-window -t -1 \; previous-window
bind-key -n M-S-Right swap-window -t +1 \; next-window

# copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# reload
bind r source-file "~/.tmux.conf" \; display "Reload!"

#######################
# Tmux Plugin Manager #
#######################

# List of plugins
set -g @plugin "tmux-plugins/tpm"

# lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

set -g @plugin "sainnhe/tmux-fzf"

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'omerxx/tmux-sessionx'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
