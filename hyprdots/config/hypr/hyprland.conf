# ── Monitor ──
monitor=eDP-1,1920x1080@60,0x0,1

# 工作区分配
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:HDMI-A-2, default:true
workspace = 5, monitor:HDMI-A-2
workspace = 6, monitor:HDMI-A-2

# ── 输入 ──
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

# ── 自动启动 ──
exec-once = waybar
exec-once = nm-applet
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = clash-verge
exec-once = fcitx5 -d
exec-once = mako
exec-once = hypridle
exec-once = awww-daemon
exec-once = spotifyd
exec-once = sleep 1 && awww img -t grow --transition-duration 2 ~/Pictures/rain_girl.jpg

# ── 通用 ──
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7aa2f7ff)
    col.inactive_border = rgba(3b4261ff)
    layout = dwindle
}

# ── 修饰 ──
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 2
    }
}

# ── 动画 ──
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ── 快捷键 ──
$mainMod = SUPER

# 终端 & 窗口
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | head -1 | awk '{print $2}' | xargs kill
bind = $mainMod, F, fullscreen
bind = $mainMod, SPACE, togglefloating

bind = $mainMod, U, pseudo  # dwindle split

# 电源菜单
bind = $mainMod, P, exec, ~/.config/rofi/powermenu/powermenu.sh
bind = $mainMod, M, exec, ~/.config/rofi/clipboard/launcher.sh
bind = $mainMod, A, exec, bash ~/.config/rofi/wifi/wifi.sh

# 启动器
bind = $mainMod, D, exec, bash ~/.config/rofi/launcher/launcher.sh

# 应用
bind = $mainMod, B, exec, firefox
bind = $mainMod, E, exec, kitty -e yazi
bind = $mainMod, N, exec, spotify-launcher

# 截图
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

# 聚焦 (vim 风格)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# 切换显示器焦点
bind = $mainMod, comma, focusmonitor, l
bind = $mainMod, period, focusmonitor, r

# 移动窗口
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, SEMICOLON, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# 调整窗口大小
bind = $mainMod CTRL, H, resizeactive, -20 0
bind = $mainMod CTRL, L, resizeactive, 20 0
bind = $mainMod CTRL, K, resizeactive, 0 -20
bind = $mainMod CTRL, J, resizeactive, 0 20

# 工作区
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# 音量 & 亮度
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# 锁屏
bind = $mainMod SHIFT, L, exec, hyprlock

# 退出 Hyprland
bind = $mainMod SHIFT, M, exit

# ── 窗口规则 ──
# 浮动弹窗
windowrule = match:class pavucontrol, float 1
windowrule = match:class nm-connection-editor, float 1
windowrule = match:class polkit-gnome-authentication-agent-1, float 1
windowrule = match:class com.saivert.pwvucontrol, float 1

# 浮动 + 居中
windowrule = match:class mpv, float 1, center 1, size 70% 70%
windowrule = match:class ncspot, float 1, center 1, size 50% 80%
