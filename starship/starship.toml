format = """
[Close the world, Open the next.](italic dimmed green)
[┌─\\[SYS::CORE\\]─](bold green) $username$hostname
[├─](bold green) $directory$git_branch$git_status$git_commit$git_metrics$git_state$c$nodejs$python
[└─>](bold red) $character"""

right_format = """$status$cmd_duration"""

[character]
success_symbol = "[_](bold green)"
error_symbol = "[_](bold red)"
vimcmd_symbol = "[N](bold green)"

# --- User & Host ---

[username]
style_user = "bold red"
show_always = true
format = "[$user]($style)"

[hostname]
ssh_only = false
format = "[@$hostname]($style)"
style = "bold red"

# --- Directory ---

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = false
format = " [\\[$path\\]]($style) "

# --- Git ---

[git_branch]
symbol = "wired/"
style = "dimmed yellow"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
modified = "!"
staged = "+"
untracked = "?"
deleted = "✘"
renamed = "»"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
stashed = "≡"

[git_commit]
style = "dimmed green"
format = "[<$hash>]($style) "
commit_hash_length = 7
only_detached = false

[git_state]
style = "bold yellow"
format = "[\\($state( $progress_current/$progress_total)\\)]($style) "
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_metrics]
disabled = false
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"
added_style = "bold green"
deleted_style = "bold red"

# --- Language & Runtime ---

[c]
symbol = " "
style = "dimmed blue"
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
style = "dimmed green"
format = "[$symbol$version]($style) "
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = " "
style = "dimmed yellow"
format = "[$symbol$version( \\($virtualenv\\))]($style) "

# --- Right Prompt ---

[cmd_duration]
min_time = 2000
format = " [took $duration]($style)"
style = "bold yellow"

[status]
disabled = false
format = "[exit:$status]($style) "
style = "bold red"
